<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description"
      content="help new clients to contact the company and can come to get fun with us">
    <meta name="author" content="Eli Avila">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr-logo.jpeg" alt="wwr company logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <div class="contact-info">
            <h1>ThunderRun Rafting Co.</h1>
            <p>123 Main River Street
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </div>
        <!--Map + Form Section-->
        <section class="contact-section">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3648.066028259982!2d-96.77358588031362!3d19.33300153014057!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2smx!4v1780776413569!5m2!1ses-419!2smx"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="placeholder" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="placeholder" required>
                <fieldset>
                    <legend>Message Purpose</legend>
                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general" checked>
                        General Inquiry
                    </label>
                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>
                    <label for="suggestion">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>
                </fieldset>
                <label for="message">Message</label>
                <label>
                    <textarea id="message" name="mailbox" placeholder="Type here"
                      rows="5"></textarea>
                </label>

                <label class="checkbox-label">Please Subscribe me to the monthlyly newsletter
                    <input type="checkbox" id="newsleter" name="newsletter" checked>
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <!--Emplyee Profiles-->

        <section class="serve">
            <h2>We Are Here to Serve You</h2>
            <div class="profile">

                <figure>
                    <img src="images/river-guides.jpg" alt="nest river guides team">
                    <figcaption>River Guides, Isaac's Team</figcaption>
                </figure>
                <figure>
                    <img src="images/trip-lead.jpg" alt="principal trip lead">
                    <figcaption>Trip Lead, Angel</figcaption>
                </figure>
                <figure>
                    <img src="images/photographer.jpg" alt="photographer team lead">
                    <figcaption>Amazing Photographer, Aubrey</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | ThunderRun Rafting | Eli Avila</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/?locale=es_LA">
                <img src="images/facebook-icon.png" alt="facebook icon">
            </a>
            <a href="https://mx.linkedin.com/">
                <img src="images/linkedin-icon.png" alt="linkeldin icon">
            </a>
            <a href="https://www.instagram.com/">
                <img src="images/instagram-icon.png" alt="instagram icon">
            </a>
        </nav>
    </footer>
</body>

</html>
